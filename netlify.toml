[build]
  command = "npm run build"
  publish = "public"

# www → no-www
[[redirects]]
  from = "https://www.abogado-laboral.es/*"
  to   = "https://abogado-laboral.es/:splat"
  status = 301
  force  = true

# Legacy paths del boilerplate
[[redirects]]
  from = "/site.html"
  to   = "/"
  status = 301
[[redirects]]
  from = "/index.html"
  to   = "/"
  status = 301
[[redirects]]
  from = "/directorio/*"
  to   = "/"
  status = 301
[[redirects]]
  from = "/ejemplohtml/*"
  to   = "/"
  status = 301
[[redirects]]
  from = "/templates/*"
  to   = "/"
  status = 301
[[redirects]]
  from = "/legal/aviso-legal/"
  to   = "/aviso-legal/"
  status = 301
[[redirects]]
  from = "/legal/cookies/"
  to   = "/politica-de-cookies/"
  status = 301
[[redirects]]
  from = "/legal/politica-de-privacidad/"
  to   = "/politica-de-privacidad/"
  status = 301
[[redirects]]
  from = "/confirmacion.html"
  to   = "/gracias/"
  status = 301

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; img-src 'self' https: data:; font-src 'self' https: data:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com; frame-src https://www.google.com https://maps.google.com https://www.youtube.com; object-src 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/static/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
